seed: 123
device: auto
experiment:
  name: deit_small_patch16_224_v1_smoke
dataset:
  name: nsd_algonauts
  label: deit_small_patch16_224_v1_smoke
  root: data/raw/nsd_algonauts
  manifest_path: data/manifests/nsd_algonauts_prf_visualrois_full_manifest.csv
  split: train
  subject_id: subj01
  roi: V1
  max_items: 64
  validate_files: true
model:
  name: deit_small_patch16_224
  backend: timm
  pretrained: true
  eval_mode: true
preprocessing:
  input_size:
  - 224
  - 224
  mean: imagenet
  std: imagenet
neural:
  layers:
  - blocks.0
  - blocks.3
  - blocks.6
  - blocks.9
  - blocks.11
  response_key: roi_responses
  feature_reduction: spatial_mean
  train_fraction: 0.8
  ridge_alpha: 1.0
  metric: correlation
  rsa:
    enabled: true
    rdm_metric: correlation
    response_rdm_metric: correlation
    compare_method: spearman
output:
