seed: 123
device: auto
experiment:
  name: resnet50_clip_v1_debug
dataset:
  name: nsd_algonauts
  label: resnet50_clip_v1_debug
  root: data/raw/nsd_algonauts
  manifest_path: data/manifests/nsd_algonauts_prf_visualrois_500_manifest.csv
  split: train
  subject_id: subj01
  roi: V1
  max_items: 16
  validate_files: true
model:
  name: resnet50_clip
  backend: timm
  pretrained: false
  eval_mode: true
preprocessing:
  input_size:
  - 224
  - 224
  mean: imagenet
  std: imagenet
neural:
  layers:
  - layer1
  - layer2
  - layer3
  - layer4
  response_key: roi_responses
  feature_reduction: spatial_mean
  train_fraction: 0.8
  ridge_alpha: 1.0
  metric: correlation
  rsa:
    enabled: true
    rdm_metric: correlation
    response_rdm_metric: correlation
    compare_method: spearman
output:
  dir: D:\Git\saliency\.tmp_pytest_neural_summary_impl\test_ssl_multimodal_candidate_0\outputs/resnet50_clip_v1_debug
