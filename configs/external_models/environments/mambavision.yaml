name: hma-mambavision
channels:
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - cuda-nvcc=12.6
  - cuda-cudart-dev=12.6
  - cuda-cccl
  - gcc_linux-64=12
  - gxx_linux-64=12
  - ninja
  - packaging
  - numpy
  - pillow
  - pyyaml
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu126
      - torch==2.6.0+cu126
      - torchvision==0.21.0+cu126
      - timm==1.0.15
      - transformers==4.50.0
      - huggingface-hub
      - einops
      - tensorboardX==2.6.2.2
      - Pillow==11.1.0
      - requests==2.32.3
