name: hma-deepgaze
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pytorch>=2.3
  - torchvision
  - pytorch-cuda=12.1
  - numpy
  - pillow
  - scipy
  - pyyaml
  - pip:
      - deepgaze-pytorch==1.2.1
      - clip@git+https://github.com/openai/CLIP.git
      - einops
      - imageio
      - scikit-image
      - fvcore
