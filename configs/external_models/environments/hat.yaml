name: hma-hat
channels:
  - pytorch
  - nvidia
  - defaults
  - conda-forge
dependencies:
  - python=3.9
  - pip=22.3.1
  - setuptools=65.5.0
  - wheel=0.37.1
  - pytorch::pytorch=1.13.1
  - pytorch::torchvision=0.14.1
