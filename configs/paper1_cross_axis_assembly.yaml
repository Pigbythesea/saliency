schema_version: hma.paper1.cross_axis_assembly_plan.v0
lane: cross_axis
contract: configs/paper1_publication_contract.yaml
execution_enabled: true
model_eligibility_table: outputs/paper1_publication_v0/preflight/model_rerun_eligibility_table.csv
model_certification_summary: outputs/paper1_publication_v0/preflight/model_certification_summary.csv
inputs:
  behavioral: outputs/paper1_publication_v0/behavioral/aggregate.csv
  latent_neural_encoding: outputs/paper1_publication_v0/neural_encoding/encoding_scores.csv
  geometry: outputs/paper1_publication_v0/geometry/geometry_scores.csv
  efficiency_resource: outputs/paper1_publication_v0/efficiency/efficiency_profiles.csv
optional_inputs:
  behavioral_uncertainty: outputs/paper1_publication_v0/behavioral/uncertainty.csv
  resource_allocation: outputs/paper1_publication_v0/efficiency/resource_allocation_profiles.csv
outputs:
  model_axis_scores: outputs/paper1_publication_v0/cross_axis/model_axis_scores.csv
  clean_rerun_audit: outputs/paper1_publication_v0/audits/clean_rerun_audit.csv
  failure_log: outputs/paper1_publication_v0/logs/cross_axis_clean_assembly_failure.log
rules:
  refuse_legacy_or_admission_inputs: true
  report_only_coverage_missingness_validity: true
  interpretation_allowed: false
  preserve_join_keys:
    - model_id
    - model_role
    - family
    - behavioral_regime
    - behavioral_object
    - roi
    - stream
    - subject_id
    - evidence_status
admission:
  require_cross_axis_gate: accepted_with_limitations_or_better
  require_publication_root_inputs_only: true
  require_clean_upstream_outputs_before_actual_assembly: true
