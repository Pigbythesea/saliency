seed: 123
device: auto
experiment:
  name: neural_nsd_algonauts_v3_500
dataset:
  name: nsd_algonauts
  label: neural_nsd_algonauts_v3_500
  root: data/raw/nsd_algonauts
  manifest_path: data/manifests/nsd_algonauts_prf_visualrois_500_manifest.csv
  split: train
  subject_id: subj01
  roi: V3
  max_items: 500
  validate_files: true
model:
  name: resnet50
  backend: timm
  pretrained: true
  eval_mode: true
preprocessing:
  input_size:
  - 224
  - 224
  mean: imagenet
  std: imagenet
neural:
  layers:
  - layer1
  - layer2
  - layer3
  - layer4
  response_key: roi_responses
  feature_reduction: spatial_mean
  train_fraction: 0.8
  ridge_alpha: 1.0
  metric: correlation
  rsa:
    enabled: true
    rdm_metric: correlation
    response_rdm_metric: correlation
    compare_method: spearman
output:
  dir: outputs/neural_nsd_algonauts_v3_500
