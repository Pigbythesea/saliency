seed: 123
device: cpu
experiment:
  name: deit_small_static_ventral_full
  matrix_version: paper1_matrix_v2
  stage: full
dataset:
  name: nsd_algonauts
  label: deit_small_static_ventral_full
  root: data/raw/nsd_algonauts
  manifest_path: data/manifests/nsd_algonauts_subj01_streams_full_manifest.csv
  split: train
  subject_id: subj01
  roi: ventral
  max_items: 9841
  validate_files: true
model:
  name: deit_small_static
  backend: external_artifact
  pretrained: true
  eval_mode: true
external_artifact:
  path: outputs/paper1_matrix_v2/external_artifacts/full/deit_small_static
  verify_hashes: true
  feature_cache_dir: outputs/paper1_matrix_v2/cache/full/deit_small_static/raw_features
preprocessing:
  input_size:
  - 224
  - 224
  interpolation: bicubic
  crop_pct: 0.875
  mean:
  - 0.485
  - 0.456
  - 0.406
  std:
  - 0.229
  - 0.224
  - 0.225
neural:
  layers:
  - blocks.0
  - blocks.3
  - blocks.6
  - blocks.9
  - blocks.11
  response_key: roi_responses
  noise_ceiling_key: noise_ceiling
  feature_reduction: flatten_pca
  pca_components: 512
  pca_solver: randomized
  pca_whiten: false
  feature_reduction_seed: 123
  pca_cache_dir: outputs/paper1_matrix_v2/cache/full/deit_small_static/pca
  train_fraction: 0.8
  ridge_alpha: 1.0
  ridge_alphas:
  - 0.001
  - 0.01
  - 0.1
  - 1.0
  - 10.0
  - 100.0
  - 1000.0
  - 10000.0
  - 100000.0
  - 1000000.0
  - 10000000.0
  validation_fraction: 0.2
  metric: correlation
  selection:
    enabled: true
    validation_fraction: 0.2
    primary_score: mean_noise_normalized_score
  rsa:
    enabled: false
  geometry:
    enabled: true
    methods:
    - linear_cka
    - subset_rsa
    subset_sizes:
    - 512
    - 1024
    - 2048
    subset_seeds:
    - 123
    - 456
    - 789
    null_control_seeds:
    - 123
    - 456
    - 789
output:
  dir: outputs/paper1_matrix_v2/neural/full/deit_small_static/ventral
