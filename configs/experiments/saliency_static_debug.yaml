seed: 123
device: auto

dataset:
  name: dummy_static_saliency
  root: data/saliency_static
  max_items: 3
  image_shape: [3, 16, 16]
  map_shape: [16, 16]

model:
  name: dummy_vision_encoder

saliency:
  method: dummy_gradient_free

metrics:
  - nss
  - cc
  - similarity
  - kl

output:
  dir: outputs/saliency_static_debug
  save_visualizations: true
  num_visualizations: 2
