seed: 123
device: auto
experiment:
  name: coco_search18_pilot500_resnet50_integrated_gradients
dataset:
  name: coco_search18
  label: coco_search18_pilot500
  root: data/raw/COCO-Search18
  manifest_path: data/manifests/pilot/coco_search18_pilot500_manifest.csv
  split: val
  image_size:
  - 224
  - 224
  max_items: null
  validate_files: true
  generate_fixation_map: true
  fixation_sigma: 10.0
model:
  name: resnet50
  backend: timm
  pretrained: true
  eval_mode: true
preprocessing:
  input_size:
  - 224
  - 224
  mean: imagenet
  std: imagenet
saliency:
  method: integrated_gradients
  steps: 16
metric_controls:
  seed: 123
  auc_borji_splits: 100
  shuffled_auc_splits: 100
  max_positive_fixations_per_image: 256
  shuffled_auc_pool_points_per_image: 256
  emd_downsample: 32
cache:
  enabled: true
  dir: saliency_maps
  reuse: true
metrics:
- nss
- shuffled_auc
- auc_borji
- auc_judd
- cc
- similarity
- kl
- emd
output:
  dir: outputs/real_matrix_v2/coco_search18_pilot500/resnet50_integrated_gradients
  save_visualizations: true
  num_visualizations: 5
