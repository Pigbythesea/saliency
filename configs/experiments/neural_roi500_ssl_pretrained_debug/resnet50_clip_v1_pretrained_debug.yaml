seed: 123
device: auto
experiment:
  name: resnet50_clip_v1_pretrained_debug
dataset:
  name: nsd_algonauts
  label: resnet50_clip_v1_pretrained_debug
  root: data/raw/nsd_algonauts
  manifest_path: data/manifests/nsd_algonauts_prf_visualrois_500_manifest.csv
  split: train
  subject_id: subj01
  roi: V1
  max_items: 16
  validate_files: true
model:
  name: resnet50_clip
  backend: timm
  pretrained: true
  eval_mode: true
preprocessing:
  input_size:
  - 224
  - 224
  mean: imagenet
  std: imagenet
neural:
  layers:
  - stages.0
  - stages.1
  - stages.2
  - stages.3
  response_key: roi_responses
  feature_reduction: spatial_mean
  train_fraction: 0.8
  ridge_alpha: 1.0
  metric: correlation
  rsa:
    enabled: true
    rdm_metric: correlation
    response_rdm_metric: correlation
    compare_method: spearman
output:
  dir: outputs/neural_roi500_ssl_pretrained_debug/resnet50_clip_v1_pretrained_debug
