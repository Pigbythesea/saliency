seed: 123
device: auto
experiment:
  name: salicon_transformer_relevance_smoke_vit_small_patch14_dinov2_transformer_relevance
dataset:
  name: salicon
  label: salicon_transformer_relevance_smoke
  root: data/raw/SALICON
  manifest_path: data/manifests/pilot/salicon_pilot500_manifest.csv
  split: val
  image_size:
  - 224
  - 224
  max_items: 8
  validate_files: true
model:
  name: vit_small_patch14_dinov2
  backend: timm
  pretrained: true
  eval_mode: true
preprocessing:
  input_size:
  - 518
  - 518
  mean: imagenet
  std: imagenet
saliency:
  method: transformer_relevance
  grid_size:
  - 37
  - 37
  head_fusion: mean
  discard_ratio: 0.0
metric_controls:
  seed: 123
  auc_borji_splits: 100
  shuffled_auc_splits: 100
  max_positive_fixations_per_image: 256
  shuffled_auc_pool_points_per_image: 256
  emd_downsample: 32
cache:
  enabled: true
  dir: saliency_maps
  reuse: true
metrics:
- nss
- auc_judd
- cc
- similarity
- kl
output:
  dir: outputs/transformer_relevance_debug/salicon_transformer_relevance_smoke/vit_small_patch14_dinov2_transformer_relevance
  save_visualizations: true
  num_visualizations: 3
