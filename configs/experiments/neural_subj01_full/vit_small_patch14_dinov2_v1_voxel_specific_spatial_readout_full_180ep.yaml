seed: 123
device: auto
experiment:
  name: vit_small_patch14_dinov2_v1_voxel_specific_spatial_readout_full_180ep
dataset:
  name: nsd_algonauts
  label: vit_small_patch14_dinov2_v1_voxel_specific_spatial_readout_full_180ep
  root: data/raw/nsd_algonauts
  manifest_path: data/manifests/nsd_algonauts_prf_visualrois_full_manifest.csv
  split: train
  subject_id: subj01
  roi: V1
  max_items: 9841
  validate_files: true
model:
  name: vit_small_patch14_dinov2
  backend: timm
  pretrained: true
  eval_mode: true
preprocessing:
  input_size:
  - 518
  - 518
  mean: imagenet
  std: imagenet
neural:
  encoding_method: learned_spatial_readout
  layers:
  - blocks.3
  response_key: roi_responses
  noise_ceiling_key: noise_ceiling
  train_fraction: 0.8
  metric: correlation
  learned_readout:
    variant: voxel_specific_lowrank
    spatial_rank: 4
    validation_fraction: 0.2
    max_epochs: 180
    batch_size: 32
    target_batch_size: 128
    lr: 0.001
    weight_decay: 0.0001
    patience: 15
    objective: pearson
    progress: true
    progress_every: 1
  rsa:
    enabled: false
    rdm_metric: correlation
    response_rdm_metric: correlation
    compare_method: spearman
output:
  dir: C:/saliency_outputs/neural_subj01_full/vit_small_patch14_dinov2_v1_voxel_specific_spatial_readout_full_180ep
