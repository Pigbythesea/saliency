seed: 123
device: auto
experiment:
  name: vit_small_patch14_dinov2_v2_flatten_pca_validation_selection_full
dataset:
  name: nsd_algonauts
  label: vit_small_patch14_dinov2_v2_flatten_pca_validation_selection_full
  root: data/raw/nsd_algonauts
  manifest_path: data/manifests/nsd_algonauts_prf_visualrois_full_manifest.csv
  split: train
  subject_id: subj01
  roi: V2
  max_items: 9841
  validate_files: true
model:
  name: vit_small_patch14_dinov2
  backend: timm
  pretrained: true
  eval_mode: true
preprocessing:
  input_size:
  - 518
  - 518
  mean: imagenet
  std: imagenet
neural:
  layers:
  - blocks.0
  - blocks.3
  - blocks.6
  - blocks.9
  - blocks.11
  response_key: roi_responses
  noise_ceiling_key: noise_ceiling
  feature_reduction: flatten_pca
  pca_components: 512
  pca_solver: randomized
  pca_whiten: false
  feature_reduction_seed: 123
  train_fraction: 0.8
  ridge_alpha: 1.0
  ridge_alphas:
  - 0.001
  - 0.01
  - 0.1
  - 1.0
  - 10.0
  - 100.0
  - 1000.0
  - 10000.0
  - 100000.0
  - 1000000.0
  - 10000000.0
  validation_fraction: 0.2
  metric: correlation
  selection:
    enabled: true
    validation_fraction: 0.2
    primary_score: mean_noise_normalized_score
  rsa:
    enabled: false
    rdm_metric: correlation
    response_rdm_metric: correlation
    compare_method: spearman
output:
  dir: outputs/neural_subj01_full/vit_small_patch14_dinov2_v2_flatten_pca_validation_selection_full
