seed: 123
device: auto
experiment:
  name: deit_small_patch16_224_v1_flatten_pca_smoke
dataset:
  name: nsd_algonauts
  label: deit_small_patch16_224_v1_flatten_pca_smoke
  root: data/raw/nsd_algonauts
  manifest_path: data/manifests/nsd_algonauts_prf_visualrois_full_manifest.csv
  split: train
  subject_id: subj01
  roi: V1
  max_items: 64
  validate_files: true
model:
  name: deit_small_patch16_224
  backend: timm
  pretrained: true
  eval_mode: true
preprocessing:
  input_size:
  - 224
  - 224
  mean: imagenet
  std: imagenet
neural:
  layers:
  - blocks.0
  - blocks.3
  - blocks.6
  - blocks.9
  - blocks.11
  response_key: roi_responses
  noise_ceiling_key: noise_ceiling
  feature_reduction: flatten_pca
  pca_components: 16
  pca_solver: randomized
  pca_whiten: false
  feature_reduction_seed: 123
  train_fraction: 0.8
  ridge_alpha: 1.0
  ridge_alphas:
  - 0.01
  - 0.1
  - 1.0
  - 10.0
  - 100.0
  validation_fraction: 0.2
  metric: correlation
  rsa:
    enabled: true
    rdm_metric: correlation
    response_rdm_metric: correlation
    compare_method: spearman
output:
  dir: outputs/neural_large_smoke/deit_small_patch16_224_v1_flatten_pca_smoke
