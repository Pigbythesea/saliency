seed: 123
device: auto
experiment:
  name: vit_small_patch14_dinov2_v1_learned_spatial_readout_smoke
dataset:
  name: nsd_algonauts
  label: vit_small_patch14_dinov2_v1_learned_spatial_readout_smoke
  root: data/raw/nsd_algonauts
  manifest_path: data/manifests/nsd_algonauts_prf_visualrois_full_manifest.csv
  split: train
  subject_id: subj01
  roi: V1
  max_items: 64
  validate_files: true
model:
  name: vit_small_patch14_dinov2
  backend: timm
  pretrained: true
  eval_mode: true
preprocessing:
  input_size:
  - 518
  - 518
  mean: imagenet
  std: imagenet
neural:
  encoding_method: learned_spatial_readout
  layers:
  - blocks.3
  response_key: roi_responses
  noise_ceiling_key: noise_ceiling
  train_fraction: 0.8
  metric: correlation
  learned_readout:
    validation_fraction: 0.2
    max_epochs: 100
    batch_size: 32
    target_batch_size: 256
    lr: 0.001
    weight_decay: 0.0001
    patience: 10
    objective: pearson
  rsa:
    enabled: false
    rdm_metric: correlation
    response_rdm_metric: correlation
    compare_method: spearman
output:
  dir: outputs/neural_large_smoke/vit_small_patch14_dinov2_v1_learned_spatial_readout_smoke
