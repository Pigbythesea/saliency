schema_version: hma.paper1.admission_panel.v1
contract: configs/paper1_publication_contract.yaml
evidence_label: admission_panel
seed: 123
output_root: outputs/paper1_publication_v0
behavioral:
  dataset: salicon
  root: data/raw/SALICON
  manifest: data/manifests/v2/salicon_static2000_manifest.csv
  split: val
  image_size: [224, 224]
  max_items: 128
  bootstrap_resamples: 2000
  bootstrap_confidence: 0.95
  models: [deepgaze_iie, center_prior, random_baseline]
neural:
