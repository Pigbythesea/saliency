  manifest: data/manifests/nsd_algonauts_prf_visualrois_500_manifest.csv
  split: train
  subject_id: subj01
  roi: V1
  max_items: 96
  pca_components: 24
  train_fraction: 0.8
  validation_fraction: 0.2
  ridge_alphas: [0.01, 0.1, 1.0, 10.0, 100.0, 1000.0, 10000.0]
  geometry_bootstrap_resamples: 200
  geometry_bootstrap_confidence: 0.95
  geometry_subset_size: 64
efficiency:
  device: cuda
  warmup_runs: 2
  measured_runs: 8
  repeats: 3
